name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpu-and-emulation:
    name: ${{ matrix.os }} / ${{ matrix.precision }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        precision: [fp64, fp32]
    steps:
      - uses: actions/checkout@v5
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-${{ matrix.precision }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Test CPU, Python, CUDA stub, and CUDA kernel emulation
        run: >-
          bazel test //...
          --config=${{ matrix.precision }}
          --test_output=errors
      - name: Test nondefault CUDA capacities
        if: matrix.os == 'ubuntu-latest' && matrix.precision == 'fp64'
        run: >-
          bazel test //:cuda_kernel_emulation_test //:cuda_stub_test
          --config=fp64
          --cuda_max_state_dimension=8
          --cuda_max_control_dimension=4
          --cuda_max_mixed_constraints=2
          --cuda_max_state_constraints=2
          --test_output=errors

  sanitizers:
    name: ubuntu / ${{ matrix.sanitizer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan]
    steps:
      - uses: actions/checkout@v5
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}-${{ matrix.sanitizer }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Test C++ implementation and CUDA kernel emulation
        run: >-
          bazel test
          //:clqr_test
          //:adversarial_cpu_test
          //:workspace_allocation_test
          //:cuda_stub_test
          //:cuda_kernel_emulation_test
          --config=fp64
          --config=${{ matrix.sanitizer }}
          --test_output=errors
